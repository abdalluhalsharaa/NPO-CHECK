<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Checklist</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root{
      --radius: 18px;
      --shadow2: 0 12px 30px rgba(0,0,0,.10);
      --shadow: 0 22px 60px rgba(0,0,0,.12);
      --t: .18s ease;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    /* ===== THEMES ===== */

    /* Clouds (default) */
    [data-theme="clouds"]{
      --bgSolid: #f6fbff;
      --panel: rgba(255,255,255,.90);
      --panel2: rgba(255,255,255,.82);
      --line: rgba(15,23,42,.10);
      --text: #0b1220;
      --muted: #51637d;
      --accent: #0ea5a4;
      --accent2:#2563eb;
      --neuro: #7c3aed;         /* neuro accent */
      --danger:#e11d48;
      --focus: 0 0 0 4px rgba(37,99,235,.18);

      --grad1: radial-gradient(1200px 520px at 15% -10%, rgba(37,99,235,.16), transparent 60%);
      --grad2: radial-gradient(900px 480px at 90% 0%, rgba(14,165,164,.14), transparent 60%);
      --grad3: radial-gradient(900px 520px at 20% 115%, rgba(255,255,255,.92), transparent 60%);
      --grad4: radial-gradient(900px 520px at 90% 115%, rgba(255,255,255,.86), transparent 62%);
    }

    /* Night */
    [data-theme="night"]{
      --bgSolid: #070c16;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.04);
      --line: rgba(255,255,255,.10);
      --text: #eaf1ff;
      --muted: #a9b7dc;
      --accent: #35d0ba;
      --accent2:#5aa7ff;
      --neuro: #a78bfa;
      --danger:#ff4d79;
      --focus: 0 0 0 4px rgba(53,208,186,.18);

      --grad1: radial-gradient(1200px 600px at 20% -10%, rgba(90,167,255,.26), transparent 60%);
      --grad2: radial-gradient(900px 500px at 92% 0%, rgba(53,208,186,.20), transparent 60%);
      --grad3: radial-gradient(700px 500px at 20% 110%, rgba(255,255,255,.06), transparent 60%);
      --grad4: radial-gradient(700px 500px at 90% 110%, rgba(255,255,255,.05), transparent 60%);
    }

    /* Neon */
    [data-theme="neon"]{
      --bgSolid:#050412;
      --panel: rgba(255,255,255,.07);
      --panel2: rgba(255,255,255,.05);
      --line: rgba(255,255,255,.12);
      --text: #eef0ff;
      --muted: #b4b7e5;
      --accent:#b8ff6a;
      --accent2:#7c3aed;
      --neuro: #38bdf8;
      --danger:#ff3d9a;
      --focus: 0 0 0 4px rgba(184,255,106,.18);

      --grad1: radial-gradient(1200px 600px at 20% -10%, rgba(124,58,237,.26), transparent 60%);
      --grad2: radial-gradient(900px 500px at 92% 0%, rgba(184,255,106,.16), transparent 60%);
      --grad3: radial-gradient(700px 500px at 20% 110%, rgba(56,189,248,.14), transparent 60%);
      --grad4: radial-gradient(700px 500px at 90% 110%, rgba(184,255,106,.10), transparent 60%);
    }

    /* Army */
    [data-theme="army"]{
      --bgSolid: #071006;
      --panel: rgba(18, 26, 16, .88);
      --panel2: rgba(12, 18, 10, .86);
      --line: rgba(255,255,255,.10);
      --text: #f0f4ea;
      --muted: #b9c1ad;
      --accent: #9ae66e;
      --accent2:#d4af37;
      --neuro: #7dd3fc;
      --danger:#ff5a7a;
      --focus: 0 0 0 4px rgba(154,230,110,.18);

      --grad1: radial-gradient(1000px 560px at 15% -10%, rgba(154,230,110,.10), transparent 60%);
      --grad2: radial-gradient(900px 500px at 92% 0%, rgba(212,175,55,.10), transparent 60%);
      --grad3: radial-gradient(900px 520px at 20% 115%, rgba(255,255,255,.05), transparent 60%);
      --grad4: radial-gradient(900px 520px at 90% 115%, rgba(255,255,255,.03), transparent 62%);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--font);
      background: var(--grad1), var(--grad2), var(--grad3), var(--grad4), var(--bgSolid);
      color: var(--text);
      overflow-x:hidden;
      position: relative;
    }

    /* Army camo overlay */
    body::before{
      content:"";
      position: fixed;
      inset:0;
      z-index: -1;
      pointer-events:none;
      opacity: 0;
    }
    [data-theme="army"] body::before{
      opacity: .75;
      background:
        radial-gradient(400px 260px at 12% 30%, rgba(154,230,110,.18), transparent 60%),
        radial-gradient(380px 260px at 72% 40%, rgba(212,175,55,.12), transparent 62%),
        radial-gradient(420px 280px at 50% 75%, rgba(0,0,0,.18), transparent 60%),
        repeating-linear-gradient(45deg, rgba(10,18,10,.35) 0 14px, rgba(23,40,18,.35) 14px 28px, rgba(60,90,45,.35) 28px 42px),
        repeating-linear-gradient(-35deg, rgba(5,12,5,.22) 0 18px, rgba(80,110,60,.14) 18px 36px);
      filter: contrast(1.05) saturate(1.1);
      mix-blend-mode: overlay;
    }

    .wrap{ min-height:100%; padding: 18px; display:flex; justify-content:center; }
    .container{ width: min(1100px, 100%); display:flex; flex-direction:column; gap:14px; }

    .card{
      border-radius: var(--radius);
      border:1px solid var(--line);
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      box-shadow: var(--shadow2);
      padding:14px;
      backdrop-filter: blur(10px);
      position: relative;
    }

    /* Neon rotating ring around day box */
    .dayCard{ position: relative; }
    [data-theme="neon"] .dayCard::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius: calc(var(--radius) + 2px);
      background: conic-gradient(from 0deg, rgba(184,255,106,.0), rgba(184,255,106,.55), rgba(124,58,237,.55), rgba(56,189,248,.55), rgba(184,255,106,.0));
      filter: blur(10px);
      opacity: .85;
      z-index: 0;
      animation: spin 2.8s linear infinite;
    }
    [data-theme="neon"] .dayCard::after{
      content:"";
      position:absolute;
      inset: 1px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      z-index: 0;
    }
    [data-theme="neon"] .dayCard > *{ position: relative; z-index: 1; }

    @keyframes spin{ to{ transform: rotate(360deg);} }

    /* Header layout */
    .topRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-start;
    }
    .title{ font-weight: 950; letter-spacing:.2px; font-size: 18px; margin:0; display:flex; align-items:center; gap:10px; }
    .sub{ margin:6px 0 0; color: var(--muted); font-size: 13px; line-height:1.45; }

    .controls{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
    .select{
      border:1px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding:10px 12px;
      border-radius: 14px;
      font-size: 13px;
      outline:none;
      min-width: 210px;
    }
    .select:focus{ box-shadow: var(--focus); }

    .btn{
      border-radius: 14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding: 10px 12px;
      cursor:pointer;
      font-weight: 900;
      transition: transform var(--t), filter var(--t);
      white-space:nowrap;
    }
    .btn:hover{ transform: translateY(-1px); filter: brightness(1.03); }
    .btnDanger{
      border-color: rgba(225,29,72,.35);
      background: rgba(225,29,72,.10);
    }

    /* Countdown styles */
    .countdownRow{ display:flex; gap:12px; align-items:baseline; flex-wrap:wrap; margin-top: 6px; }
    .examBlock{ display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }

    /* Primary vs secondary countdown blocks */
    .primaryExam{
      font-size: 22px;
      font-weight: 1000;
      letter-spacing:.2px;
    }
    .secondaryExam{
      font-size: 16px;            /* a bit bigger than before */
      font-weight: 950;
      letter-spacing:.15px;
    }

    /* Neuro color different + slightly larger (but still secondary unless swapped on May31) */
    .neuroAccent{ color: var(--neuro); }

    /* Neon blinking effect on countdown numbers */
    [data-theme="neon"] .blink{
      animation: blinkGlow 1.2s ease-in-out infinite;
      text-shadow: 0 0 14px rgba(56,189,248,.55), 0 0 26px rgba(184,255,106,.35);
    }
    @keyframes blinkGlow{
      0%, 100%{ opacity: .65; filter: brightness(1); }
      50%{ opacity: 1; filter: brightness(1.2); }
    }

    .progressMeta{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:10px;
      color: var(--muted);
      font-size: 13px;
    }
    .progressMeta strong{ color: var(--text); font-weight: 1000; }
    .bar{
      margin-top:8px;
      height: 10px;
      border-radius:999px;
      background: rgba(255,255,255,.12);
      border:1px solid var(--line);
      overflow:hidden;
    }
    .barFill{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width .55s ease;
    }

    .dateStrip{ display:flex; gap:10px; overflow:auto; padding-bottom:2px; scrollbar-width: thin; }
    .datePill{
      flex: 0 0 auto;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding:10px 12px;
      border-radius: 999px;
      cursor:pointer;
      font-size: 12px;
      font-weight: 900;
      transition: transform var(--t), border-color var(--t), background var(--t);
      display:flex; align-items:center; gap:8px;
      user-select:none;
    }
    .datePill:hover{ transform: translateY(-1px); border-color: rgba(37,99,235,.35); }
    .datePill.active{ background: rgba(37,99,235,.10); border-color: rgba(37,99,235,.45); }
    .datePill.today{ background: rgba(14,165,164,.10); border-color: rgba(14,165,164,.45); }
    [data-theme="army"] .datePill.active{ background: rgba(154,230,110,.12); border-color: rgba(154,230,110,.35); }
    .miniDot{ width:8px; height:8px; border-radius:50%; background: var(--accent); }

    .todayTitle{
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom: 10px;
    }
    .todayTitle h2{ margin:0; font-size: 16px; font-weight: 1000; }
    .todayTitle .right{
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .subjectBlock{ padding: 10px 2px; }
    .subjectName{
      font-weight: 950;
      font-size: 13px;
      margin:0 0 10px 0;
      letter-spacing: .2px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .divider{ border:0; border-top:1px solid var(--line); margin: 8px 0; opacity: .65; }

    .list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; }
    .item{
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      transition: transform var(--t), border-color var(--t), background var(--t);
      position:relative;
      overflow:hidden;
    }
    .item:hover{ transform: translateY(-1px); border-color: rgba(14,165,164,.35); }
    [data-theme="army"] .item:hover{ border-color: rgba(154,230,110,.35); }

    .leftRow{ display:flex; align-items:center; gap:10px; min-width:0; }
    .statusBtn{
      width: 34px; height: 34px;
      border-radius: 12px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.08);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 18px;
      transition: transform var(--t);
      flex: 0 0 auto;
    }
    .statusBtn:hover{ transform: translateY(-1px); }

    .text{
      font-weight: 900;
      font-size: 13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 58ch;
    }

    .item.done{
      border-color: rgba(14,165,164,.45);
      background: rgba(14,165,164,.10);
    }
    [data-theme="night"] .item.done{ border-color: rgba(53,208,186,.45); background: rgba(53,208,186,.10); }
    [data-theme="neon"] .item.done{ border-color: rgba(184,255,106,.45); background: rgba(184,255,106,.10); }
    [data-theme="army"] .item.done{ border-color: rgba(154,230,110,.45); background: rgba(154,230,110,.10); }
    .item.done .text{ text-decoration: line-through; opacity:.75; }

    .item::after{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(90deg, transparent, rgba(14,165,164,.18), transparent);
      transform: translateX(-120%);
      opacity:0;
      transition: transform .55s ease, opacity .35s ease;
      pointer-events:none;
    }
    .item.done::after{ transform: translateX(120%); opacity:1; }

    .rightControls{ display:flex; align-items:center; gap:10px; flex: 0 0 auto; }
    .moveSelect{
      border:1px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding:8px 10px;
      border-radius: 12px;
      font-size: 12px;
      outline:none;
      max-width: 200px;
    }
    .moveSelect:focus{ box-shadow: var(--focus); }

    /* Note (May 30) RTL inside */
    .note{
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 14px;
      line-height: 2.0;
      font-size: 14px;
      white-space: pre-wrap;
      direction: rtl;
      text-align: right;
    }

    /* Notes per day */
    .notesBox{
      margin-top: 12px;
      border-top:1px solid var(--line);
      padding-top: 12px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .notesLabel{
      font-size: 12px;
      color: var(--muted);
      font-weight: 950;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .notesArea{
      width:100%;
      min-height: 90px;
      resize: vertical;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      outline:none;
      font-size: 13px;
      line-height: 1.5;
    }
    .notesArea:focus{ box-shadow: var(--focus); }

    /* Summary cards */
    .summaryRow{ display:grid; grid-template-columns: repeat(12, 1fr); gap:12px; }
    .summaryCard{ grid-column: span 4; padding:12px; }
    @media (max-width: 880px){ .summaryCard{ grid-column: span 12; } }
    .sumTop{ display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .sumTitle{ margin:0; color: var(--muted); font-size: 12px; font-weight: 1000; }
    .sumVal{ font-weight: 1000; font-size: 13px; font-variant-numeric: tabular-nums; }
    .sumBar{
      margin-top:8px;
      height: 8px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.12);
      overflow:hidden;
    }
    .sumFill{ height:100%; width:0%; transition: width .55s ease; }

    /* Toast (Undo) */
    .toast{
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 9999;
      border-radius: 16px;
      border:1px solid var(--line);
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      box-shadow: var(--shadow2);
      padding: 10px 12px;
      backdrop-filter: blur(10px);
      display:flex;
      gap:12px;
      align-items:center;
      max-width: min(520px, calc(100vw - 36px));
      animation: toastIn .22s ease;
    }
    @keyframes toastIn{
      from{ transform: translateY(10px); opacity: 0; }
      to{ transform: translateY(0); opacity: 1; }
    }
    .toastMsg{
      font-size: 13px;
      color: var(--text);
      font-weight: 900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .toastBtn{
      border-radius: 999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding: 8px 10px;
      cursor:pointer;
      font-weight: 950;
    }

    /* Confetti */
    .confettiWrap{ pointer-events:none; position:fixed; inset:0; overflow:hidden; z-index: 9998; }
    .confettiPiece{
      position:absolute;
      width:10px; height:14px;
      border-radius: 3px;
      opacity:.95;
      transform: translate3d(0,-20px,0) rotate(0deg);
      animation: fall linear forwards;
      will-change: transform, opacity;
    }
    @keyframes fall{
      0%{ transform: translate3d(var(--x), -30px, 0) rotate(0deg); opacity: 1; }
      100%{ transform: translate3d(calc(var(--x) + var(--drift)), calc(100vh + 30px), 0) rotate(var(--rot)); opacity: 0.95; }
    }
    .celebrateBanner{
      position:fixed;
      left:50%;
      top:18px;
      transform: translateX(-50%);
      z-index: 9999;
      pointer-events:none;
      padding:10px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow2);
      backdrop-filter: blur(10px);
      font-weight: 1000;
      letter-spacing:.2px;
      display:flex;
      gap:10px;
      align-items:center;
      animation: pop .35s ease, fadeOut 3.0s ease forwards;
      border:1px solid var(--line);
      background: rgba(255,255,255,.75);
      color:#0b1220;
    }
    [data-theme="night"] .celebrateBanner,
    [data-theme="neon"] .celebrateBanner,
    [data-theme="army"] .celebrateBanner{ background: rgba(255,255,255,.10); color: var(--text); }
    @keyframes pop{
      0%{ transform: translateX(-50%) translateY(-10px) scale(.98); opacity:0; }
      100%{ transform: translateX(-50%) translateY(0) scale(1); opacity:1; }
    }
    @keyframes fadeOut{
      0%{ opacity:1; }
      75%{ opacity:1; }
      100%{ opacity:0; }
    }

    /* Stars overlay (Clouds theme) */
    .skyEmojis{
      position: fixed;
      inset:0;
      z-index: -1;
      pointer-events:none;
      overflow:hidden;
      opacity: .55;
      display:none;
    }
    [data-theme="clouds"] .skyEmojis{ display:block; }
    .skyEmojis span{
      position:absolute;
      font-size: 20px;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.12));
      animation: drift 16s linear infinite;
      transform: translateX(-10vw);
      opacity: .85;
    }
    @keyframes drift{
      0%{ transform: translateX(-12vw) translateY(0px) rotate(0deg); opacity: .0; }
      10%{ opacity: .85; }
      100%{ transform: translateX(112vw) translateY(-22px) rotate(18deg); opacity: .0; }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const {useEffect, useMemo, useRef, useState} = React;

    const STORAGE_KEY = "medicalChecklist.v8";
    const THEMES = {
      clouds: "Clouds (Stars 💫🌍🪐)",
      night: "Night Shift",
      neon: "Neon Pulse",
      army: "Army Mode"
    };

    const SUBJECTS_ORDER = ["Ortho", "Neuromedicine", "Neurosurgery", "Healthcare"];
    const SUBJECT_LABEL = {
      Ortho: "Orthopedics",
      Neuromedicine: "Neuromedicine",
      Neurosurgery: "Neurosurgery",
      Healthcare: "Healthcare"
    };

    const TOTAL_LECTURES = 44;

    function startOfDay(date){ return new Date(date.getFullYear(), date.getMonth(), date.getDate()); }
    function isoKey(date){ return startOfDay(date).toISOString().slice(0,10); }
    function daysDiff(fromDate, toDate){
      const ms = startOfDay(toDate) - startOfDay(fromDate);
      return Math.round(ms / (1000*60*60*24));
    }
    function clampPct(x){ if(!isFinite(x)) return 0; return Math.max(0, Math.min(100, x)); }
    function formatLong(date){
      return date.toLocaleDateString(undefined, { weekday:"long", year:"numeric", month:"long", day:"numeric" });
    }

    function buildBaseData(year){
      const d = (m, day) => new Date(year, m, day);
      const days = [
        { date: d(4,22), title:"22 May", note:null },
        { date: d(4,23), title:"23 May", note:null },
        { date: d(4,24), title:"24 May", note:null },
        { date: d(4,25), title:"25 May", note:null },
        { date: d(4,26), title:"26 May", note:null },
        { date: d(4,27), title:"27 May", note:null },
        { date: d(4,28), title:"28 May", note:null },
        { date: d(4,29), title:"29 May", note:null },
        { date: d(4,30), title:"30 May",
          note:
`بسم الله الرحمن الرحيم
{ وَمَا لَنَاۤ أَلَّا نَتَوَكَّلَ عَلَى ٱللَّهِ وَقَدۡ هَدَىٰنَا سُبُلَنَاۚ وَلَنَصۡبِرَنَّ عَلَى ٱللَّهِ فَلۡیَتَوَكَّلِ ٱلۡمُتَوَكِّلُونَ }
[سُورَةُ إِبۡرَاهِيمَ: ١٢]`
        },
        { date: d(4,31), title:"31 May", note:null },
        { date: d(5,1), title:"1 June", note:null },
      ].map(x => ({...x, dateKey: isoKey(x.date)}));

      const L = (dateKey, subject, text, idx) => ({
        lectureId: `L__${dateKey}__${subject}__${idx}`,
        originalDateKey: dateKey,
        subject,
        text
      });

      const lectures = [];

      // 22
      lectures.push(L(isoKey(d(4,22)), "Ortho", "Principles of fractures", 0));
      lectures.push(L(isoKey(d(4,22)), "Neuromedicine", "Medical neurology", 0));
      lectures.push(L(isoKey(d(4,22)), "Healthcare", "Evidence based medicine", 0));

      // 23
      lectures.push(L(isoKey(d(4,23)), "Ortho", "Peripheral nerve injuries", 0));
      lectures.push(L(isoKey(d(4,23)), "Ortho", "X-ray", 1));
      lectures.push(L(isoKey(d(4,23)), "Neuromedicine", "CVA", 0));
      lectures.push(L(isoKey(d(4,23)), "Healthcare", "Communication skills", 0));

      // 24
      lectures.push(L(isoKey(d(4,24)), "Ortho", "Overview of Spine Anatomy", 0));
      lectures.push(L(isoKey(d(4,24)), "Ortho", "Scoliosis & kyphosis", 1));
      lectures.push(L(isoKey(d(4,24)), "Neuromedicine", "Peripheral nervous", 0));
      lectures.push(L(isoKey(d(4,24)), "Healthcare", "Dr.Pt relationship", 0));

      // 25
      [
        "Spondylosis & spondylolisthesis",
        "Spina bifida and torticollis",
        "Spine disorders",
        "Principles in spine fracture",
        "Intervertebral disc prolapse"
      ].forEach((t,i)=>lectures.push(L(isoKey(d(4,25)), "Ortho", t, i)));
      lectures.push(L(isoKey(d(4,25)), "Neuromedicine", "Movement disorders", 0));
      lectures.push(L(isoKey(d(4,25)), "Healthcare", "The Diagnostic process", 0));

      // 26
      lectures.push(L(isoKey(d(4,26)), "Ortho", "Bone tumor x ray", 0));
      lectures.push(L(isoKey(d(4,26)), "Ortho", "Musculoskeletal", 1));
      lectures.push(L(isoKey(d(4,26)), "Neuromedicine", "Multiple sclerosis", 0));
      lectures.push(L(isoKey(d(4,26)), "Neurosurgery", "Back pain", 0));
      lectures.push(L(isoKey(d(4,26)), "Healthcare", "Breaking bad news", 0));

      // 27
      lectures.push(L(isoKey(d(4,27)), "Ortho", "Upper limb (first half)", 0));
      lectures.push(L(isoKey(d(4,27)), "Neuromedicine", "Dementia", 0));
      lectures.push(L(isoKey(d(4,27)), "Healthcare", "Counselling", 0));

      // 28
      lectures.push(L(isoKey(d(4,28)), "Ortho", "Upper limb (second half)", 0));
      lectures.push(L(isoKey(d(4,28)), "Ortho", "Pediatric foot", 1));
      lectures.push(L(isoKey(d(4,28)), "Ortho", "Legg Calve Perthes disease", 2));
      lectures.push(L(isoKey(d(4,28)), "Neuromedicine", "Epilepsy", 0));
      lectures.push(L(isoKey(d(4,28)), "Neurosurgery", "CNS tumors", 0));
      lectures.push(L(isoKey(d(4,28)), "Healthcare", "Laboratory interpretation", 0));

      // 29 (no Infective here)
      ["Arthritis in hip & knee","SCFE","DDH","Genu varus and valgus","Lower limb"]
        .forEach((t,i)=>lectures.push(L(isoKey(d(4,29)), "Ortho", t, i)));
      lectures.push(L(isoKey(d(4,29)), "Healthcare", "Difficult patient", 0));

      // 31 (Infective moved here)
      lectures.push(L(isoKey(d(4,31)), "Neuromedicine", "Infective neurological diseases", 0));
      lectures.push(L(isoKey(d(4,31)), "Neurosurgery", "Spinal injuries", 0));
      lectures.push(L(isoKey(d(4,31)), "Neurosurgery", "Congenital anomalies", 1));

      // 1 June (Headache moved here)
      lectures.push(L(isoKey(d(5,1)), "Neuromedicine", "Headache", 0));
      lectures.push(L(isoKey(d(5,1)), "Neurosurgery", "Head injuries", 0));
      lectures.push(L(isoKey(d(5,1)), "Neurosurgery", "Introduction to SAH", 1));

      return {days, lectures};
    }

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      }catch{ return null; }
    }
    function saveState(state){
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch{}
    }

    function makeConfettiPieces(count=170){
      const colors = ["#2563eb","#0ea5a4","#22c55e","#f59e0b","#fb7185","#7c3aed","#38bdf8"];
      const pieces = [];
      for(let i=0;i<count;i++){
        const left = Math.random() * 100;
        const delay = Math.random() * 0.25;
        const duration = 1.9 + Math.random() * 1.3;
        const drift = (Math.random() * 160 - 80) + "px";
        const rot = (Math.random() * 720 - 360) + "deg";
        const x = left + "vw";
        pieces.push({ id: `${Date.now()}_${i}`, left:left+"vw", top:(-10-Math.random()*30)+"px",
          bg: colors[Math.floor(Math.random()*colors.length)], delay:delay+"s", duration:duration+"s", drift, rot, x
        });
      }
      return pieces;
    }

    function statusEmoji(theme, done){
      if(theme === "clouds") return done ? "✨" : "⭐️";
      if(theme === "army") return done ? "💣" : "🪖";
      if(theme === "neon") return done ? "◆" : "◇";
      return done ? "✅" : "⬜";
    }

    function App(){
      const year = new Date().getFullYear();
      const base = useMemo(()=>buildBaseData(year), [year]);

      const [theme, setTheme] = useState("clouds");
      const [completed, setCompleted] = useState(()=>new Set());
      const [moveMap, setMoveMap] = useState(()=>({})); // lectureId -> dateKey
      const [selectedDateKey, setSelectedDateKey] = useState(base.days[0].dateKey);
      const [notes, setNotes] = useState(()=> ({}));

      const [lastMove, setLastMove] = useState(null);
      const undoTimer = useRef(null);

      const [confetti, setConfetti] = useState([]);
      const [showBanner, setShowBanner] = useState(false);
      const celebratedRef = useRef({});

      const todayKey = useMemo(()=>isoKey(new Date()), []);

      function currentDateFor(lecture){
        const mapped = moveMap[lecture.lectureId];
        return base.days.some(d=>d.dateKey===mapped) ? mapped : lecture.originalDateKey;
      }

      useEffect(()=>{
        const st = loadState();
        if(st){
          if(typeof st.theme === "string") setTheme(st.theme);
          if(Array.isArray(st.completedIds)) setCompleted(new Set(st.completedIds));
          if(st.moveMap && typeof st.moveMap === "object") setMoveMap(st.moveMap);
          if(st.notes && typeof st.notes === "object") setNotes(st.notes);
        }
        // Auto-open Today
        const inRange = base.days.some(d=>d.dateKey===todayKey);
        setSelectedDateKey(inRange ? todayKey : base.days[0].dateKey);
      }, [base.days, todayKey]);

      useEffect(()=>{
        saveState({ theme, completedIds:Array.from(completed), moveMap, selectedDateKey, notes });
      }, [theme, completed, moveMap, selectedDateKey, notes]);

      useEffect(()=>{ document.documentElement.setAttribute("data-theme", theme); }, [theme]);

      const grouped = useMemo(()=>{
        const byDay = {};
        base.days.forEach(d=> byDay[d.dateKey] = {Ortho:[],Neuromedicine:[],Neurosurgery:[],Healthcare:[]} );
        base.lectures.forEach(L=>{
          const dk = currentDateFor(L);
          if(byDay[dk]) byDay[dk][L.subject].push(L);
        });
        return byDay;
      }, [base, moveMap]);

      const selectedDay = useMemo(()=>{
        return base.days.find(d=>d.dateKey===selectedDateKey) || base.days[0];
      }, [base.days, selectedDateKey]);

      const selectedLectures = useMemo(()=>{
        const g = grouped[selectedDateKey];
        if(!g) return [];
        const flat = [];
        SUBJECTS_ORDER.forEach(s=>flat.push(...g[s]));
        return flat;
      }, [grouped, selectedDateKey]);

      const doneCount = useMemo(()=>{
        let n=0;
        base.lectures.forEach(L=>{ if(completed.has(L.lectureId)) n++; });
        return n;
      }, [base.lectures, completed]);

      const overallPct = clampPct((doneCount / TOTAL_LECTURES) * 100);

      const dayDoneCount = useMemo(()=>{
        let n=0;
        selectedLectures.forEach(L=>{ if(completed.has(L.lectureId)) n++; });
        return n;
      }, [selectedLectures, completed]);

      // Exams
      const examOrthoHealth = useMemo(()=>new Date(year, 4, 31), [year]); // May 31
      const examNeuro = useMemo(()=>new Date(year, 5, 2), [year]);        // June 2

      const daysToOrthoHealth = useMemo(()=>daysDiff(new Date(), examOrthoHealth), [examOrthoHealth]);
      const daysToNeuro = useMemo(()=>daysDiff(new Date(), examNeuro), [examNeuro]);

      const orthoLabel =
        daysToOrthoHealth > 0 ? `${daysToOrthoHealth} day${daysToOrthoHealth===1?"":"s"} left` :
        daysToOrthoHealth === 0 ? `Exam day` : `${Math.abs(daysToOrthoHealth)} day${Math.abs(daysToOrthoHealth)===1?"":"s"} ago`;

      const neuroLabel =
        daysToNeuro > 0 ? `${daysToNeuro} day${daysToNeuro===1?"":"s"} left` :
        daysToNeuro === 0 ? `Exam day` : `${Math.abs(daysToNeuro)} day${Math.abs(daysToNeuro)===1?"":"s"} ago`;

      // Swap emphasis on May 31 (Ortho exam day): Neuro becomes primary
      const isOrthoExamDay = useMemo(()=>{
        const now = startOfDay(new Date()).getTime();
        return now === startOfDay(examOrthoHealth).getTime();
      }, [examOrthoHealth]);

      // Celebrate (ignore note day)
      useEffect(()=>{
        if(selectedDay.note) return;
        if(selectedLectures.length === 0) return;
        const key = selectedDay.dateKey;
        const isComplete = dayDoneCount === selectedLectures.length;
        if(isComplete && !celebratedRef.current[key]){
          celebratedRef.current[key] = true;
          setShowBanner(true);
          setConfetti(makeConfettiPieces(170));
          const t1 = setTimeout(()=>setShowBanner(false), 3200);
          const t2 = setTimeout(()=>setConfetti([]), 3600);
          return ()=>{ clearTimeout(t1); clearTimeout(t2); };
        }
      }, [dayDoneCount, selectedLectures.length, selectedDay.dateKey, selectedDay.note]);

      function toggleLecture(lectureId){
        setCompleted(prev=>{
          const next = new Set(prev);
          next.has(lectureId) ? next.delete(lectureId) : next.add(lectureId);
          return next;
        });
      }

      function moveLecture(lecture, toDateKey){
        const fromDateKey = currentDateFor(lecture);
        if(!toDateKey || toDateKey === fromDateKey) return;

        setMoveMap(prev=>({ ...prev, [lecture.lectureId]: toDateKey }));

        const msg = `Moved "${lecture.text}" (${fromDateKey} → ${toDateKey})`;
        setLastMove({ lectureId: lecture.lectureId, fromDateKey, toDateKey, text: lecture.text, msg });

        if(undoTimer.current) clearTimeout(undoTimer.current);
        undoTimer.current = setTimeout(()=>setLastMove(null), 6000);
      }

      function undoMove(){
        if(!lastMove) return;
        setMoveMap(prev=>{
          const next = {...prev};
          next[lastMove.lectureId] = lastMove.fromDateKey;
          return next;
        });
        setLastMove(null);
      }

      function updateNote(dateKey, value){
        setNotes(prev=>({ ...prev, value }));
      }

      // Stars overlay positions (clouds theme)
      const sky = useMemo(()=>{
        const emojis = ["✨","🌟","⭐️","🪐","☄️"];
        const items = [];
        for(let i=0;i<18;i++){
          const em = emojis[Math.floor(Math.random()*emojis.length)];
          const top = Math.random()*90;
          const delay = Math.random()*8;
          const dur = 12 + Math.random()*10;
          items.push({id:i, em, top, delay, dur});
        }
        return items;
      }, []);

      const summary = useMemo(()=>{
        const sums = { Ortho:{total:0,done:0}, Healthcare:{total:0,done:0}, Neurology:{total:0,done:0} };
        base.lectures.forEach(L=>{
          const bucket = (L.subject==="Neuromedicine" || L.subject==="Neurosurgery") ? "Neurology" : L.subject;
          sums[bucket].total += 1;
          if(completed.has(L.lectureId)) sums[bucket].done += 1;
        });
        const pct = (x)=>clampPct((x.done/(x.total||1))*100);
        return {
          Ortho:{...sums.Ortho, pct: pct(sums.Ortho)},
          Healthcare:{...sums.Healthcare, pct: pct(sums.Healthcare)},
          Neurology:{...sums.Neurology, pct: pct(sums.Neurology)}
        };
      }, [base.lectures, completed]);

      function gradientFor(key){
        if(theme==="army"){
          if(key==="Ortho") return "linear-gradient(90deg, #d4af37, #9ae66e)";
          if(key==="Healthcare") return "linear-gradient(90deg, #9ae66e, #d4af37)";
          return "linear-gradient(90deg, #7dd3fc, rgba(255,255,255,.25))";
        }
        if(key==="Ortho") return "linear-gradient(90deg, #38bdf8, var(--accent))";
        if(key==="Healthcare") return "linear-gradient(90deg, #fb7185, var(--accent2))";
        return "linear-gradient(90deg, var(--accent2), var(--accent))";
      }

      function renderDayBox(){
        const dayGroup = grouped[selectedDateKey];

        if(selectedDay.note){
          return (
            <>
              <div className="note">{selectedDay.note}</div>
              <div className="notesBox">
                <div className="notesLabel">📝 Notes (saved)</div>
                <textarea
                  className="notesArea"
                  value={notes[selectedDateKey] || ""}
                  onChange={(e)=>updateNote(selectedDateKey, e.target.value)}
                  placeholder="Write your notes for this day..."
                />
              </div>
            </>
          );
        }

        const blocks = [];
        SUBJECTS_ORDER.forEach(sub=>{
          const items = dayGroup ? dayGroup[sub] : [];
          if(!items || items.length===0) return;
          blocks.push(
            <div className="subjectBlock" key={sub}>
              <p className="subjectName">{SUBJECT_LABEL[sub]}</p>
              <ul className="list">
                {items.map(L=>{
                  const isDone = completed.has(L.lectureId);
                  const dk = currentDateFor(L);
                  return (
                    <li className={"item " + (isDone ? "done" : "")} key={L.lectureId}>
                      <div className="leftRow">
                        <button className="statusBtn" onClick={()=>toggleLecture(L.lectureId)} aria-pressed={isDone}>
                          {statusEmoji(theme, isDone)}
                        </button>
                        <div className="text" title={L.text}>{L.text}</div>
                      </div>
                      <div className="rightControls">
                        <select className="moveSelect" value={dk} onChange={(e)=>moveLecture(L, e.target.value)}>
                          {base.days.map(dy=>(
                            <option key={dy.dateKey} value={dy.dateKey}>Move to: {dy.title}</option>
                          ))}
                        </select>
                      </div>
                    </li>
                  );
                })}
              </ul>
            </div>
          );
        });

        const withDividers = [];
        blocks.forEach((b, i)=>{
          withDividers.push(b);
          if(i !== blocks.length - 1) withDividers.push(<hr className="divider" key={"div_"+i} />);
        });

        return (
          <>
            {withDividers}
            <div className="notesBox">
              <div className="notesLabel">📝 Notes (saved)</div>
              <textarea
                className="notesArea"
                value={notes[selectedDateKey] || ""}
                onChange={(e)=>updateNote(selectedDateKey, e.target.value)}
                placeholder="Write your notes for this day..."
              />
            </div>
          </>
        );
      }

      const primaryClass = theme==="neon" ? "blink" : "";
      const neuroBlink = theme==="neon" ? "blink" : "";

      return (
        <>
          {/* Stars overlay in clouds theme */}
          {theme === "clouds" && (
            <div className="skyEmojis" aria-hidden="true">
              {sky.map(s=>(
                <span key={s.id}
                  style={{ top: s.top + "vh", left: (-10) + "vw", animationDelay: s.delay + "s", animationDuration: s.dur + "s" }}
                >
                  {s.em}
                </span>
              ))}
            </div>
          )}

          {/* Confetti */}
          {confetti.length > 0 && (
            <div className="confettiWrap" aria-hidden="true">
              {confetti.map(p => (
                <div key={p.id} className="confettiPiece"
                  style={{
                    left: p.left, top: p.top, background: p.bg,
                    animationDelay: p.delay, animationDuration: p.duration,
                    "--drift": p.drift, "--rot": p.rot, "--x": p.x
                  }}
                />
              ))}
            </div>
          )}
          {showBanner && (
            <div className="celebrateBanner">
              🎉 Completed all topics for {selectedDay.title}!
            </div>
          )}

          {/* Undo Toast */}
          {lastMove && (
            <div className="toast" role="status" aria-live="polite">
              <div className="toastMsg">{lastMove.msg}</div>
              <button className="toastBtn" onClick={undoMove}>Undo</button>
            </div>
          )}

          <div className="wrap">
            <div className="container">
              {/* Header */}
              <div className="card">
                <div className="topRow">
                  <div>
                    <h1 className="title">🩺 Medical Checklist</h1>
                    <p className="sub">Study plan • auto-saves locally • move lectures between days</p>

                    {/* Countdown with dynamic emphasis */}
                    <div className="countdownRow">
                      {!isOrthoExamDay ? (
                        <>
                          <div className="examBlock primaryExam">
                            Ortho + Healthcare exam:
                            <span className={primaryClass} style={{color:"var(--accent2)"}}>{orthoLabel}</span>
                          </div>
                          <div className="examBlock secondaryExam">
                            Neuromedicine exam:
                            <span className={"neuroAccent " + neuroBlink}>{neuroLabel}</span>
                          </div>
                        </>
                      ) : (
                        <>
                          <div className="examBlock primaryExam">
                            Neuromedicine exam:
                            <span className={"neuroAccent " + neuroBlink}>{neuroLabel}</span>
                          </div>
                          <div className="examBlock secondaryExam">
                            Ortho + Healthcare exam:
                            <span className={primaryClass} style={{color:"var(--muted)"}}>{orthoLabel}</span>
                          </div>
                        </>
                      )}
                    </div>

                    <div className="progressMeta">
                      <div>Progress: <strong>{Math.round(overallPct)}%</strong> (out of 100)</div>
                      <div>Lectures completed: <strong>{doneCount}/{TOTAL_LECTURES}</strong></div>
                    </div>

                    <div className="bar" aria-label="Overall progress bar">
                      <div className="barFill" style={{width: overallPct + "%"}}></div>
                    </div>
                  </div>

                  <div className="controls">
                    <select className="select" value={theme} onChange={(e)=>setTheme(e.target.value)} aria-label="Theme">
                      <option value="clouds">{THEMES.clouds}</option>
                      <option value="night">{THEMES.night}</option>
                      <option value="neon">{THEMES.neon}</option>
                      <option value="army">{THEMES.army}</option>
                    </select>
                    <button className="btn btnDanger" onClick={()=>{
                      // keep notes, reset progress + moves
                      setCompleted(new Set());
                      setMoveMap({});
                      celebratedRef.current = {};
                    }}>
                      Reset progress
                    </button>
                  </div>
                </div>
              </div>

              {/* Date strip */}
              <div className="card">
                <div className="dateStrip" aria-label="Dates">
                  {base.days.map(day => {
                    const isToday = day.dateKey === todayKey;
                    const isActive = day.dateKey === selectedDateKey;
                    return (
                      <button key={day.dateKey}
                        className={"datePill " + (isActive ? "active " : "") + (isToday ? "today" : "")}
                        onClick={() => setSelectedDateKey(day.dateKey)}
                        title={formatLong(day.date)}
                      >
                        <span className="miniDot" aria-hidden="true"></span>
                        {day.title}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Selected day */}
              <div className="card dayCard">
                <div className="todayTitle">
                  <h2>{formatLong(selectedDay.date)}</h2>
                  {!selectedDay.note && (
                    <div className="right">Topics completed: {dayDoneCount}/{selectedLectures.length}</div>
                  )}
                </div>
                {renderDayBox()}
              </div>

              {/* Summary 3 boxes */}
              <div className="summaryRow">
                {["Ortho","Healthcare","Neurology"].map(k => (
                  <div className="card summaryCard" key={k}>
                    <div className="sumTop">
                      <p className="sumTitle">
                        {k === "Ortho" ? "Orthopedics" : (k === "Healthcare" ? "Healthcare" : "Neurology (Neuromedicine + Neurosurgery)")}
                      </p>
                      <div className="sumVal">{Math.round(summary[k].pct)}% • {summary[k].done}/{summary[k].total}</div>
                    </div>
                    <div className="sumBar" aria-hidden="true">
                      <div className="sumFill" style={{width: summary[k].pct + "%", background: gradientFor(k)}}></div>
                    </div>
                  </div>
                ))}
              </div>

            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
